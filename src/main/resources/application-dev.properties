# -----------------------------
# Configuración general
# -----------------------------
spring.application.name=seniorclick-2026BK
server.port=8091
spring.thymeleaf.cache=false

# -----------------------------
# Configuración de la base de datos (PostgreSQL)
# -----------------------------
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/universilab_db
spring.datasource.username=postgres
spring.datasource.password=admin
# Fuerza a la app a probar la conexión antes de usarla
spring.datasource.hikari.keepaliveTime=30000
spring.datasource.hikari.maxLifetime=600000
spring.datasource.hikari.connectionTestQuery=SELECT 1

# -----------------------------
# Configuración JPA / Hibernate
# -----------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.generate-ddl=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# -----------------------------
# Logging
# -----------------------------
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# Añade estas dos líneas clave:
logging.level.org.springframework.web=DEBUG
logging.level.com.fasterxml.jackson=DEBUG

# -----------------------------
# Internacionalización / Mensajes
# -----------------------------
spring.messages.basename=messages

# -----------------------------
# Email
# -----------------------------
# spring.mail.username=gamosa1956@gmail.com
# spring.mail.password=xsywmwrgeipeoyrg
spring.mail.username=${EMAIL_USER}
spring.mail.password=${EMAIL_PASS}
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
