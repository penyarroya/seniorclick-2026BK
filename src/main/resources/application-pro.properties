# -----------------------------
# Configuración general
# -----------------------------
spring.application.name=seniorclick-2026BK
server.port=8092
spring.thymeleaf.cache=true

# -----------------------------
# Configuración de la base de datos (PostgreSQL)
# -----------------------------
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/universilab_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP (pool de conexiones por defecto en Spring Boot)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=SeniorClickHikariCP

# -----------------------------
# Configuración JPA / Hibernate
# -----------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.id.new_generator_mappings=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true

# -----------------------------
# Logging
# -----------------------------
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO
logging.level.org.springframework=INFO

# -----------------------------
# Internacionalización / Mensajes
# -----------------------------
spring.messages.basename=messages

